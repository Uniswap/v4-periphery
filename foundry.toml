[profile.default]
out = 'foundry-out'
solc_version = '0.8.26'
optimizer_runs = 44444444
via_ir = true
ffi = true
fs_permissions = [{ access = "read-write", path = ".forge-snapshots/" }, { access = "read", path = "foundry-out/" }]
evm_version = "cancun"
gas_limit = "3000000000"
fuzz_runs = 10_000
bytecode_hash = "none"

additional_compiler_profiles = [
  { name = "posm", via_ir = true, optimizer_runs = 500 },
  { name = "descriptor", via_ir = true, optimizer_runs = 1 },
  { name = "test", via_ir = false }
]

compilation_restrictions = [
  { paths = "src/PositionManager.sol", optimizer_runs = 500 },
  { paths = "src/hooks/permissionedPools/PermissionedPositionManager.sol", optimizer_runs = 500 },
  { paths = "src/PositionDescriptor.sol", optimizer_runs = 1 },
  { paths = "src/SwapAndAdd.sol", optimizer_runs = 500 },
  { paths = "test/**", via_ir = false }
]

# Integration profile for the SwapAndAdd <-> Universal Router route test (test/SwapAndAddRoute.t.sol).
# The real UR requires via_ir, but the default profile disables it for test/**; foundry cannot mix a via_ir
# unit with a non-via_ir unit that share forge-std. Under FOUNDRY_PROFILE=integration the whole graph compiles
# with via_ir on (no test/** opt-out), so the route test and the nested UR build cleanly. The default profile
# is unchanged, so the 8 same-pool SwapAndAdd tests keep running exactly as before.
#   Run it with:  FOUNDRY_PROFILE=integration forge test
# The route test lives in its own `test-integration/` dir, which only this profile compiles — so a plain
# `forge test` on the default profile never pulls in the (via_ir-only) UR and the default suite is unaffected.
[profile.integration]
test = 'test-integration'
via_ir = true
optimizer_runs = 200
compilation_restrictions = [
  { paths = "src/PositionManager.sol", optimizer_runs = 500 },
  { paths = "src/hooks/permissionedPools/PermissionedPositionManager.sol", optimizer_runs = 500 },
  { paths = "lib/universal-router/contracts/UniversalRouter.sol", optimizer_runs = 1 }
]

[profile.debug]
via_ir = false
optimizer_runs = 200
fuzz.runs = 100

[profile.ci]
fuzz_runs = 100_000

[profile.gas]
gas_limit=30_000_000

[rpc_endpoints]
sepolia = "https://rpc.sepolia.org"
unichain_sepolia = "https://sepolia.unichain.org"
base_sepolia = "https://sepolia.base.org"
arbitrum_sepolia = "https://sepolia-rollup.arbitrum.io/rpc"
mainnet = "https://mainnet.infura.io/v3/${INFURA_API_KEY}"
